<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shift Saver - 알바 번아웃 방어기</title>
  <style>
    * { box-sizing: border-box; margin: 0; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
    :root {
      --bg: #f5f7fa; --card: #ffffff; --text: #2c3e50;
      --primary: #4361ee; --secondary: #3f37c9;
      --success: #2ecc71; --danger: #e74c3c; --warning: #f39c12;
      --border: #e2e8f0;
    }
    body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; }
    .app-container { width: min(100%, 500px); background: var(--card); min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; }
    
    .view { display: none; padding: 30px 20px; animation: fadeIn 0.3s ease; }
    .view.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    h1 { font-size: 24px; margin-bottom: 20px; text-align: center; font-weight: 800; }
    h2 { font-size: 18px; margin-bottom: 15px; color: var(--primary); }
    .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--secondary); }
    .btn-outline { background: white; border: 2px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-danger { background: var(--danger); color: white; margin-top: 20px; }
    
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .icon-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text); padding: 0; }
    
    .form-group { margin-bottom: 15px; text-align: left; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
    .form-control { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; }
    .day-selector { display: flex; gap: 5px; justify-content: space-between; }
    .day-btn { flex: 1; padding: 10px 0; border: 1px solid var(--border); border-radius: 8px; background: white; cursor: pointer; font-size: 14px; font-weight: bold; transition: 0.2s; }
    .day-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

    .dashboard { background: #f8f9fa; padding: 20px; border-radius: 16px; margin-bottom: 20px; text-align: center; border: 1px solid var(--border); }
    .hp-value { font-size: 36px; font-weight: 900; margin: 10px 0; }
    .advice-text { font-size: 15px; font-weight: 700; border-radius: 8px; padding: 8px; display: inline-block; }
    
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; font-size: 18px; }
    .cal-nav-btn { background: var(--border); border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .cal-nav-btn:hover { background: #cbd5e1; }
    
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 20px; }
    .cal-day-header { text-align: center; font-size: 12px; font-weight: bold; color: #7f8c8d; padding: 5px 0; }
    .cal-cell { aspect-ratio: 1; border: 1px solid var(--border); border-radius: 8px; padding: 5px; display: flex; flex-direction: column; cursor: pointer; position: relative; }
    .cal-cell:hover { background: #f1f2f6; }
    .date-num { font-size: 12px; font-weight: bold; margin-bottom: auto; }
    
    /* 투잡을 위한 다중 점 표시 CSS */
    .dots-container { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; margin-top: auto; }
    .shift-dot { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; }
    .shift-removed { width: 8px; height: 8px; border: 2px solid var(--border); border-radius: 50%; }
    .shift-added { width: 8px; height: 8px; background: var(--warning); border-radius: 50%; }
    
    .salary-options { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; font-size: 14px; font-weight: 600; }
    .salary-breakdown { font-size: 13px; color: var(--muted); margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
    
    #modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 10; }
    .action-modal { position: absolute; bottom: 0; left: 0; right: 0; background: white; padding: 30px 20px; border-radius: 20px 20px 0 0; text-align: center; max-height: 90vh; overflow-y: auto; }
    
    .chip-container { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; padding-bottom: 5px; scrollbar-width: none; }
    .chip-container::-webkit-scrollbar { display: none; }
    .chip { padding: 8px 14px; background: white; border: 1px solid var(--primary); border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; white-space: nowrap; color: var(--primary); transition: 0.2s; }
    .chip:hover { background: var(--primary); color: white; }
  </style>
</head>
<body>
  <div class="app-container">
    
    <div id="view-home" class="view active">
      <div style="text-align: center; margin: 60px 0;">
        <h1 style="color: #ff4d4d; font-weight: bold;">오늘도 0%</h1>
        <p style="color: var(--muted); line-height: 1.5;">알바 인생 멘탈 관리 도우미<br>한 달 치 피로도를 미리 계산해 보세요!</p>
      </div>
      <button class="btn btn-primary" onclick="switchView('view-register')">📝 기본 알바 등록하러 가기</button>
      <button class="btn btn-outline" onclick="switchView('view-calendar')">🗓️ 내 캘린더 & HP 보러 가기</button>
    </div>

    <div id="view-register" class="view">
      <div class="header-bar">
        <button class="icon-btn" onclick="switchView('view-calendar')">←</button>
        <h2 style="margin:0;">알바 설정</h2>
        <div style="width:24px;"></div>
      </div>
      
      <div class="form-group">
        <label>근무지 (알바 장소)</label>
        <input type="text" id="reg-location" class="form-control" placeholder="예: 배스킨라빈스">
      </div>
      <div class="form-group">
        <label>시급 (원)</label>
        <input type="number" id="reg-wage" class="form-control" placeholder="예: 9860">
      </div>
      <div class="form-group">
        <label>하루 기본 근무 시간 (시간)</label>
        <input type="number" id="reg-hours" class="form-control" placeholder="예: 6">
      </div>
      <div class="form-group">
        <label>고정 근무 요일 선택</label>
        <div class="day-selector" id="day-selector">
            <button class="day-btn" data-day="0" onclick="toggleDay(this)">일</button>
            <button class="day-btn" data-day="1" onclick="toggleDay(this)">월</button>
            <button class="day-btn" data-day="2" onclick="toggleDay(this)">화</button>
            <button class="day-btn" data-day="3" onclick="toggleDay(this)">수</button>
            <button class="day-btn" data-day="4" onclick="toggleDay(this)">목</button>
            <button class="day-btn" data-day="5" onclick="toggleDay(this)">금</button>
            <button class="day-btn" data-day="6" onclick="toggleDay(this)">토</button>
        </div>
      </div>
      <button class="btn btn-primary" style="margin-top: 10px;" onclick="saveJobProfile()">저장하고 캘린더 보기</button>
      <button class="btn btn-danger" onclick="resetApp()">🗑️ 모든 스케줄 & 설정 초기화</button>
    </div>

    <div id="view-calendar" class="view">
      <div class="header-bar">
        <button class="icon-btn" onclick="switchView('view-home')">🏠</button>
        <h2 style="margin:0; color: var(--text);">내 대시보드</h2>
        <button class="icon-btn" onclick="switchView('view-register')" title="설정">⚙️</button>
      </div>
      
      <div class="dashboard">
        <div style="font-size: 14px; font-weight: bold; color: var(--muted);">이번 달 내 멘탈 총결산</div>
        <div class="hp-value" id="month-hp">100%</div>
        <div class="advice-text" id="month-advice">불러오는 중...</div>
      </div>

      <div class="calendar-header">
        <button class="cal-nav-btn" id="prev-month">&lt;</button>
        <span id="cal-month-title">2026년 6월</span>
        <button class="cal-nav-btn" id="next-month">&gt;</button>
      </div>
      
      <div class="calendar-grid">
        <div class="cal-day-header">일</div><div class="cal-day-header">월</div><div class="cal-day-header">화</div>
        <div class="cal-day-header">수</div><div class="cal-day-header">목</div><div class="cal-day-header">금</div><div class="cal-day-header">토</div>
      </div>
      <div class="calendar-grid" id="calendar-body"></div>

      <div style="background: color-mix(in srgb, var(--primary) 10%, white); padding: 20px; border-radius: 16px; margin-top: 20px; text-align: center; border: 1px solid color-mix(in srgb, var(--primary) 30%, white);">
        <div style="font-size: 14px; font-weight: bold; color: var(--primary); margin-bottom: 10px;">💸 이번 달 예상 월급</div>
        
        <div class="salary-options">
          <label><input type="checkbox" id="opt-juhyu"> 주휴수당 포함 (+)</label>
          <label><input type="checkbox" id="opt-tax"> 3.3% 세금 떼기 (-)</label>
        </div>

        <div id="month-salary" style="font-size: 28px; font-weight: 900; color: var(--text);">0원</div>
        <div class="salary-breakdown" id="salary-breakdown">기본급: 0원</div>
      </div>
    </div>

    <div id="modal-overlay">
      <div class="action-modal">
        <h2 id="modal-date-title" style="margin-bottom: 20px; font-size: 20px;">X월 X일 스케줄 관리</h2>
        
        <div id="modal-shift-list" style="margin-bottom: 20px; text-align: left; border: 1px solid var(--border); padding: 10px; border-radius: 8px;">
          </div>
        
        <div id="modal-btn-group">
          <button class="btn" id="modal-action-btn" style="background: var(--danger); color: white;">기본 근무 취소</button>
          <button class="btn" id="modal-add-btn" style="background: var(--warning); color: white;" onclick="showAddForm()">➕ 근무 일정 추가</button>
          <button class="btn btn-outline" id="modal-reset-btn" style="color: var(--danger); border-color: var(--danger);">🔄 이 날짜 기록 모두 삭제</button>
          <button class="btn btn-outline" onclick="closeModal()">닫기</button>
        </div>

        <div id="modal-add-form" style="display: none; text-align: left;">
          <div style="font-size: 12px; font-weight: bold; color: var(--muted); margin-bottom: 8px;">자주 가는 근무지 빠른 선택</div>
          <div class="chip-container" id="quick-select-container"></div>

          <div class="form-group">
            <label>출근지</label>
            <input type="text" id="modal-location" class="form-control" placeholder="예: 단기 행사 스태프">
          </div>
          <div class="form-group">
            <label>시급 (원)</label>
            <input type="number" id="modal-wage" class="form-control">
          </div>
          <div class="form-group">
            <label>근무 시간 (시간)</label>
            <input type="number" id="modal-hours" class="form-control">
          </div>
          <button class="btn btn-primary" onclick="saveAddedShift()">저장하기</button>
          <button class="btn btn-outline" onclick="closeModal()">취소</button>
        </div>
      </div>
    </div>

  </div>
  <script type="module" src="./shift-saver.ts"></script>
</body>
</html>
